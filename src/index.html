<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Link to the file that Tailwind will CREATE in the next step -->
  <link href="./output.css" rel="stylesheet">
</head>
<body class="p-5">
  <button class="bg-blue-600 text-white px-6 py-2 rounded-lg transition-all duration-300 ease-in-out hover:bg-blue-700 hover:scale-110 hover:-translate-y-1 hover:shadow-xl">Hover Me</button>
  <div class="flex items-center gap-2">
    <svg class="w-6 h-6 animate-spin text-blue-600" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
    <span>Loading...</span>
  </div>
  <div class="animate-wiggle text-4xl inline-block origin-bottom-right">👋</div>
  
  <div class="w-25 h-25 bg-white shadow-sm transition duration-300 hover:-translate-y-2 hover:bg-gray-400 hover:shadow-2xl">
    <img src="image.png" alt="peel fruits" class="w-full h-auto">
    <p>peel friuit</p>
  </div>

  <div class="w-10 h-10 transition duration-300 hover:rotate-90 flex justify-center items-center relative">
    <div class="w-8 h-1 bg-black rotate-45 absolute"></div>
    <div class="w-8 h-1 bg-black -rotate-45 absolute"></div>
  </div>
  <div class="w-32 h-10 bg-red-500 text-white flex items-center justify-center rounded animate-shake">
    Wrong Password
  </div>
  <img src="image.png" class="w-16 h-auto animate-float">
  <div class="animate-heartbeat inline-block">❤️</div>
  <div class="w-30 h-30 animate-slide-up bg-red-500"></div>
</body>
</html>
